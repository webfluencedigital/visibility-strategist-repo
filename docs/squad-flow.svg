<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1100" width="1100" height="1100" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E9204F"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feFlood flood-color="#000" flood-opacity="0.4"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8A8A"/>
    </marker>
    <marker id="arrowhead-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22D3EE"/>
    </marker>
    <marker id="arrowhead-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FACC15"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1100" fill="#050505"/>

  <!-- Header -->
  <g transform="translate(550, 50)">
    <text text-anchor="middle" font-size="11" font-weight="900" letter-spacing="3" fill="#E9204F">VISIBILITY STRATEGIST</text>
    <text text-anchor="middle" y="32" font-size="28" font-weight="900" fill="#F2F2F2">Squad Flow — From URL to Ranked</text>
    <text text-anchor="middle" y="60" font-size="13" fill="#8A8A8A">Two paired agents · Seven Airtable tabs · One branded deliverable</text>
  </g>

  <!-- INPUT: target URL -->
  <g transform="translate(390, 160)">
    <rect width="320" height="62" rx="12" fill="#141414" stroke="rgba(255,255,255,0.07)" filter="url(#card-shadow)"/>
    <text x="160" y="26" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="2" fill="#8A8A8A">SKILL TRIGGER</text>
    <text x="160" y="48" text-anchor="middle" font-size="16" font-weight="700" fill="#F2F2F2" font-family="'JetBrains Mono', monospace">/visibility-audit [url]</text>
  </g>

  <!-- Arrow from input to split -->
  <path d="M 550 222 L 550 270" stroke="#8A8A8A" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- TWO AGENTS in parallel -->
  <!-- Left: SEO Strategist (cyan) -->
  <g transform="translate(80, 280)">
    <rect width="430" height="220" rx="14" fill="#0F1A1F" stroke="#22D3EE" stroke-width="1.5" filter="url(#card-shadow)"/>
    <rect width="430" height="48" rx="14" fill="#22D3EE"/>
    <rect y="34" width="430" height="14" fill="#22D3EE"/>
    <text x="20" y="30" font-size="10" font-weight="900" letter-spacing="2.5" fill="#0A0A0A">SEO STRATEGIST · WAVE 1</text>
    <text x="20" y="80" font-size="20" font-weight="900" fill="#F2F2F2">Traditional rankings.</text>
    <text x="20" y="105" font-size="14" font-weight="600" fill="#A0A0A0">Keywords. Technical. Cannibalization.</text>

    <text x="20" y="138" font-size="10" font-weight="700" letter-spacing="1.5" fill="#22D3EE">PULLS FROM</text>
    <text x="20" y="158" font-size="12" fill="#F2F2F2">→ Supermetrics (Google Search Console — primary)</text>
    <text x="20" y="178" font-size="12" fill="#F2F2F2">→ Ahrefs (volume, KD, backlinks, site audits)</text>
    <text x="20" y="198" font-size="12" fill="#F2F2F2">→ Apify (Google Trends, SERP, PAA)</text>
  </g>

  <!-- Right: AEO Strategist (yellow) -->
  <g transform="translate(590, 280)">
    <rect width="430" height="220" rx="14" fill="#1F1A0A" stroke="#FACC15" stroke-width="1.5" filter="url(#card-shadow)"/>
    <rect width="430" height="48" rx="14" fill="#FACC15"/>
    <rect y="34" width="430" height="14" fill="#FACC15"/>
    <text x="20" y="30" font-size="10" font-weight="900" letter-spacing="2.5" fill="#0A0A0A">AEO STRATEGIST · WAVE 2 + WAVE 3 AWARENESS</text>
    <text x="20" y="80" font-size="20" font-weight="900" fill="#F2F2F2">AI citations.</text>
    <text x="20" y="105" font-size="14" font-weight="600" fill="#A0A0A0">Multi-platform. Lost-prompt. Schema.</text>

    <text x="20" y="138" font-size="10" font-weight="700" letter-spacing="1.5" fill="#FACC15">AUDITS</text>
    <text x="20" y="158" font-size="12" fill="#F2F2F2">→ ChatGPT · Claude · Gemini · Perplexity</text>
    <text x="20" y="178" font-size="12" fill="#F2F2F2">→ Apify Reddit + Keyword Suggest (AnswerThePublic eq.)</text>
    <text x="20" y="198" font-size="12" fill="#F2F2F2">→ Wikidata + Knowledge Graph (entity)</text>
  </g>

  <!-- Convergence arrows -->
  <path d="M 295 500 L 295 550 L 550 600" stroke="#22D3EE" stroke-width="2" fill="none" marker-end="url(#arrowhead-cyan)"/>
  <path d="M 805 500 L 805 550 L 550 600" stroke="#FACC15" stroke-width="2" fill="none" marker-end="url(#arrowhead-yellow)"/>

  <!-- AIRTABLE BASE: 7 tabs -->
  <g transform="translate(180, 600)">
    <rect width="740" height="290" rx="14" fill="#141414" stroke="rgba(255,255,255,0.07)" stroke-width="1" filter="url(#card-shadow)"/>
    <text x="370" y="34" text-anchor="middle" font-size="10" font-weight="900" letter-spacing="2.5" fill="#E9204F">AIRTABLE BASE · appqiOiuFJBp0UNbF</text>
    <text x="370" y="58" text-anchor="middle" font-size="20" font-weight="900" fill="#F2F2F2">Visibility Strategist — 7 Tabs</text>
    <text x="370" y="80" text-anchor="middle" font-size="12" fill="#8A8A8A">One Visibility Plan record per engagement · ~50 supporting records per audit</text>

    <!-- Tab 1: Visibility Plan (master) -->
    <g transform="translate(20, 100)">
      <rect width="700" height="44" rx="8" fill="#1a1a1a" stroke="rgba(233,32,79,0.4)" stroke-width="1.5"/>
      <text x="14" y="20" font-size="9" font-weight="700" letter-spacing="1.2" fill="#E9204F">MASTER · BOTH AGENTS</text>
      <text x="14" y="36" font-size="13" font-weight="700" fill="#F2F2F2">Visibility Plan</text>
      <text x="685" y="28" text-anchor="end" font-size="11" fill="#8A8A8A">KPI targets · Phase · Next review</text>
    </g>

    <!-- 6 specialist tabs in 2 columns -->
    <g transform="translate(20, 158)">
      <!-- Left col -->
      <g>
        <rect width="340" height="34" rx="6" fill="#1a1a1a" stroke="rgba(34,211,238,0.3)"/>
        <circle cx="14" cy="17" r="4" fill="#22D3EE"/>
        <text x="26" y="21" font-size="12" font-weight="700" fill="#F2F2F2">Keyword Targets</text>
        <text x="326" y="21" text-anchor="end" font-size="10" fill="#8A8A8A">SEO</text>
      </g>
      <g transform="translate(0, 42)">
        <rect width="340" height="34" rx="6" fill="#1a1a1a" stroke="rgba(34,211,238,0.3)"/>
        <circle cx="14" cy="17" r="4" fill="#22D3EE"/>
        <text x="26" y="21" font-size="12" font-weight="700" fill="#F2F2F2">Technical Audit</text>
        <text x="326" y="21" text-anchor="end" font-size="10" fill="#8A8A8A">SEO</text>
      </g>
      <g transform="translate(0, 84)">
        <rect width="340" height="34" rx="6" fill="#1a1a1a" stroke="rgba(34,211,238,0.3)"/>
        <circle cx="14" cy="17" r="4" fill="#22D3EE"/>
        <text x="26" y="21" font-size="12" font-weight="700" fill="#F2F2F2">Ranking Tracker</text>
        <text x="326" y="21" text-anchor="end" font-size="10" fill="#8A8A8A">SEO · weekly</text>
      </g>
    </g>

    <g transform="translate(380, 158)">
      <!-- Right col -->
      <g>
        <rect width="340" height="34" rx="6" fill="#1a1a1a" stroke="rgba(250,204,21,0.3)"/>
        <circle cx="14" cy="17" r="4" fill="#FACC15"/>
        <text x="26" y="21" font-size="12" font-weight="700" fill="#F2F2F2">Question Bank</text>
        <text x="326" y="21" text-anchor="end" font-size="10" fill="#8A8A8A">AEO</text>
      </g>
      <g transform="translate(0, 42)">
        <rect width="340" height="34" rx="6" fill="#1a1a1a" stroke="rgba(180,180,180,0.25)"/>
        <text x="14" y="21" font-size="11" fill="#A0A0A0" font-style="italic">⊕ joint:</text>
        <text x="60" y="21" font-size="12" font-weight="700" fill="#F2F2F2">Sitemap Recommendations</text>
      </g>
      <g transform="translate(0, 84)">
        <rect width="340" height="34" rx="6" fill="#1a1a1a" stroke="rgba(180,180,180,0.25)"/>
        <text x="14" y="21" font-size="11" fill="#A0A0A0" font-style="italic">⊕ joint:</text>
        <text x="60" y="21" font-size="12" font-weight="700" fill="#F2F2F2">Content Calendar</text>
      </g>
    </g>
  </g>

  <!-- Arrow from Airtable to deliverable -->
  <path d="M 550 890 L 550 940" stroke="#8A8A8A" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- DELIVERABLE: branded PDF -->
  <g transform="translate(290, 950)">
    <rect width="520" height="100" rx="14" fill="url(#accent-gradient)" filter="url(#card-shadow)"/>
    <rect x="2" y="2" width="516" height="96" rx="12" fill="#0A0A0A" opacity="0.85"/>
    <text x="260" y="34" text-anchor="middle" font-size="10" font-weight="900" letter-spacing="2.5" fill="#E9204F">DELIVERABLE</text>
    <text x="260" y="62" text-anchor="middle" font-size="20" font-weight="900" fill="#F2F2F2">WebFluence-Branded Audit PDF</text>
    <text x="260" y="84" text-anchor="middle" font-size="12" fill="#A0A0A0">Rendered from audit-template.html · Fork &amp; rebrand for your agency</text>
  </g>
</svg>
