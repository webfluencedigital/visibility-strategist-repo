name: Bug report
description: Something the plugin does that it shouldn't, or fails to do that it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The more specific the better — record IDs, exact prompts, error messages all help.

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: From `.claude-plugin/plugin.json` or the plugin manager
      placeholder: e.g. v0.1.0
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Which part of the plugin is affected?
      multiple: true
      options:
        - seo-strategist agent
        - aeo-strategist agent
        - /visibility-audit skill
        - audit-template.html (deliverable rendering)
        - Airtable schema / tab creation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behaviour. Include the exact command you ran (e.g. `/visibility-audit https://example.com`).
      placeholder: I ran /visibility-audit on... and...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: connectors
    attributes:
      label: Which connectors were active?
      description: Airtable required; Supermetrics, Ahrefs, Apify recommended. List what was connected when the bug fired.
      placeholder: Airtable, Apify, no Supermetrics
    validations:
      required: false

  - type: textarea
    id: errors
    attributes:
      label: Error messages or unexpected output
      description: Paste verbatim. Trim PII (record IDs, client names) if needed.
      render: text
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Anything else
      description: Niche, target site characteristics, anything that might be relevant.
    validations:
      required: false
